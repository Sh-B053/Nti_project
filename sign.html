<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./sign.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <title>Books</title>

<body>
    <section class="signup" id="signup">
        <div class="signup-container">
            <div class="signup-card">
                <div class="signup-form">
                <h1>Sign up</h1>
                <form id="signupForm">
                    <div class="input-box">
                        <input type="text" id="username" placeholder="User name">
                        <i class="fa-solid fa-user"></i>
                        <small class="error"></small>
                    </div>
                    <div class="input-box">
                        <input type="email" id="email" placeholder="Email">
                        <i class="fa-solid fa-envelope"></i>
                        <small class="error"></small>
                    </div>
                    <div class="input-box">
                        <input type="password" id="password" placeholder="password">
                        <i class="fa-solid fa-lock"></i>
                        <small class="error"></small>
                    </div>
                    <a href="./index.html">
                        <button type="button">Sign up</button>
                    </a>                </form>
            </div>
            <div class="signup-image">
                <img src="./images/b_XqUjT4yO0cHL3icmixUt4qNQXuSb2TTlEOPgpDk-nujzrR_4s7oHiUwfJZMtZIWf0xzaL9KSOERnmF5LYYEJZREEXJZOGymX33Z9rjfkQMY3zU8o3hH8v6DR4OFvCRJy_7Ss0-pzr7wbdMe4nEJV-12XYBYbyr9vVy6CL2HSkK4P-kda6yVpK0vDvPMuQU.jpg" alt="books">
            </div>
        </div>
        </div>
    </section>
    <script src="./sign.js"></script>
</body>
</html>
